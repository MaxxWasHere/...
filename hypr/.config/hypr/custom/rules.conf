# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Hyprland screen-share / PipeWire picker (OBS, browsers). Float so it is usable; same idea as KDE portal rules in hyprland/rules.conf
windowrule = match:class org.hyprland.xdg-desktop-portal-hyprland, float on
windowrule = match:class org.hyprland.xdg-desktop-portal-hyprland, center on
windowrule = match:class org.hyprland.xdg-desktop-portal-hyprland, size (monitor_w*.65) (monitor_h*.72)

# Uncomment to apply global transparency to all windows:
# windowrule = opacity 0.89 override 0.89 override, match:class .*

# Disable blur for all xwayland apps
# windowrule = no_blur on, match:xwayland 1
